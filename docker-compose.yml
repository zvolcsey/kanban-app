services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    container_name: kanban-app-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
